version: '3.8'

services:
  app:
    build: .
    container_name: sid-app
    restart: always
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - MONGODB_URI=mongodb://mongo:27017/sid-db
      - JWT_SECRET=docker-secret-jwt-key-987654321
      - ENCRYPTION_KEY=docker-server-totp-encryption-key-32-chars-long!
    depends_on:
      - mongo

  mongo:
    image: mongo:latest
    container_name: sid-mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
